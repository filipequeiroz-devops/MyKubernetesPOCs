apiVersion: v1
kind: Pod
metadata:
  name: liveness-prob
  labels:
    purpose: demonstrate-liveness
spec:
  containers:
  - name: liveness-container-test
    image: busybox #image with necessary tools to run the command
    args:
    - /bin/sh
    - -c
    - touch /tmp/healthy; sleep 30; rm -rf /tmp/healthy; sleep 600

    livenessProbe:
      exec:
        command:
        - cat
        - /tmp/healthy
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3