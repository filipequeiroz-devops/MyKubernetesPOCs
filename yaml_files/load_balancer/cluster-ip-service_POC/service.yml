apiVersion: v1
kind: Service
metadata:
  name: frontend-service-loadbalancer
  labels:
    type: service
spec:
  type: LoadBalancer
  selector:
    type: web-app
  ports:
    - name: http
      port: 80 #Port exposed by the service
      targetPort: 80 #Port on the pod that the service will forward traffic to
      nodePort: 30008 #Port on the node that the service will forward traffic to