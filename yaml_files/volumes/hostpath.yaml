apiVersion: v1
kind: Pod

metadata:
  name: pod1
  labels:
    app: myapp
    tier: frontend

spec:
  containers:
  - name: redis-container
    image: redis:latest
    ports:
    - containerPort: 6379
    volumeMounts:
    - name: hostpath-storage
      mountPath: /myVol

  volumes:
    - name: hostpath-storage
      hostPath:
        path: /home/data