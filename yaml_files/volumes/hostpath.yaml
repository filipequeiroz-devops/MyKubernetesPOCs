apiVersion: v1
kind: Pod

metadata:
  name: pod1
  labels:
    app: myapp
    tier: frontend

spec:
  containers:
  - name: redis-container
    image: redis:latest
    ports:
    - containerPort: 6379
    volumeMounts:
    - name: hostpath-storage
      mountPath: /myVol

  volumes:
    - name: hostpath-storage
      hostPath:
        path: /home/data #diretorio onde o volume será montado no host, não no container
       #esses dados permanecem no host mesmo que o pod seja deletado, diferente do emptyDir que é deletado junto com o pod